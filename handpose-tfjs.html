<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Hand Tracking</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#050a0f; color:#e0f0ff; font-family:'Courier New',monospace; overflow:hidden; height:100dvh; display:flex; flex-direction:column; }

#container { position:relative; flex:1; overflow:hidden; background:#000; }
video { position:absolute; width:100%; height:100%; object-fit:cover; transform:scaleX(-1); }
canvas { position:absolute; width:100%; height:100%; transform:scaleX(-1); }

#overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; background:#050a0f; z-index:10; transition:opacity 0.5s; }
#overlay.hidden { opacity:0; pointer-events:none; }

.logo { font-size:60px; animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
.title { font-size:20px; font-weight:bold; letter-spacing:3px; color:#00e5ff; text-transform:uppercase; }
.sub { font-size:11px; color:#4a7a8a; letter-spacing:1px; }

#startBtn { margin-top:8px; background:transparent; border:1px solid #00e5ff; color:#00e5ff; font-family:'Courier New',monospace; font-size:14px; letter-spacing:2px; padding:12px 32px; cursor:pointer; border-radius:2px; }
#startBtn:disabled { opacity:0.4; cursor:default; }

#log { font-size:11px; color:#2a7a5a; max-width:280px; text-align:center; line-height:1.6; min-height:36px; }
#log.err { color:#ff5555; }

#hud { position:absolute; top:0; left:0; right:0; padding:8px 12px; display:flex; justify-content:space-between; z-index:5; pointer-events:none; }
.hbox { background:#050a0fcc; border:1px solid #00e5ff33; border-radius:4px; padding:4px 10px; font-size:10px; color:#00e5ff88; letter-spacing:1px; text-align:center; }
.hval { color:#00e5ff; font-size:17px; font-weight:bold; display:block; }

#bottom { background:#080f17; border-top:1px solid #0a2030; padding:8px 12px; display:flex; gap:8px; flex-shrink:0; }
.stat { flex:1; text-align:center; background:#0a1a24; border:1px solid #0d2535; border-radius:4px; padding:6px 4px; }
.slabel { font-size:9px; color:#2a5060; letter-spacing:1px; text-transform:uppercase; }
.sval { font-size:18px; color:#00e5ff; font-weight:bold; display:block; }
</style>
</head>
<body>

<div id="container">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="canvas"></canvas>

  <div id="overlay">
    <div class="logo">🖐</div>
    <div class="title">Hand Tracking</div>
    <div class="sub">TensorFlow.js · Real-time</div>
    <button id="startBtn">[ ЗАПУСТИТЬ ]</button>
    <div id="log">Нажми кнопку для запуска камеры</div>
  </div>

  <div id="hud">
    <div class="hbox">РУКИ<br><span class="hval" id="handCount">—</span></div>
    <div class="hbox">FPS<br><span class="hval" id="fpsVal">—</span></div>
  </div>
</div>

<div id="bottom">
  <div class="stat"><span class="slabel">Пальцев</span><span class="sval" id="fingers">—</span></div>
  <div class="stat"><span class="slabel">Жест</span><span class="sval" id="gesture">—</span></div>
  <div class="stat"><span class="slabel">Статус</span><span class="sval" id="statusDot">⏸</span></div>
</div>

<script>
// Динамическая загрузка скриптов
function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = () => reject(new Error('Не удалось загрузить: ' + src));
    document.head.appendChild(s);
  });
}

const log = (msg, err) => {
  const el = document.getElementById('log');
  el.textContent = msg;
  el.className = err ? 'err' : '';
};

const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17]
];
const TIPS = [4, 8, 12, 16, 20];

function countFingers(kp) {
  let n = 0;
  // Большой — X
  if (kp[4][0] > kp[3][0]) n++;
  // Остальные — Y (меньше = выше на экране)
  for (let i = 1; i < TIPS.length; i++) {
    if (kp[TIPS[i]][1] < kp[TIPS[i]-2][1]) n++;
  }
  return n;
}

function gestureEmoji(n) {
  return ['✊','☝️','✌️','🤟','🖖','✋'][Math.min(n,5)];
}

function drawHand(ctx, kp, W, H) {
  // Connections
  ctx.strokeStyle = '#00e5ffaa';
  ctx.lineWidth = 2;
  for (const [a,b] of CONNECTIONS) {
    ctx.beginPath();
    ctx.moveTo(kp[a][0]*W, kp[a][1]*H);
    ctx.lineTo(kp[b][0]*W, kp[b][1]*H);
    ctx.stroke();
  }
  // Points
  for (let i = 0; i < kp.length; i++) {
    const [x, y] = [kp[i][0]*W, kp[i][1]*H];
    const tip = TIPS.includes(i);
    ctx.beginPath();
    ctx.arc(x, y, tip ? 8 : 4, 0, Math.PI*2);
    ctx.fillStyle = tip ? '#00e5ff' : '#ffffff55';
    ctx.fill();
    if (tip) {
      ctx.beginPath();
      ctx.arc(x, y, 13, 0, Math.PI*2);
      ctx.strokeStyle = '#00e5ff44';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }
}

let model = null, running = false;
let lastT = 0, fCount = 0, fps = 0;

async function loop(video, canvas, ctx) {
  if (!running) return;
  const predictions = await model.estimateHands(video);

  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // FPS
  fCount++;
  const now = performance.now();
  if (now - lastT >= 1000) {
    fps = fCount; fCount = 0; lastT = now;
    document.getElementById('fpsVal').textContent = fps;
  }

  document.getElementById('handCount').textContent = predictions.length;
  document.getElementById('statusDot').textContent = predictions.length ? '🟢' : '⏳';

  if (predictions.length) {
    const kp = predictions[0].landmarks;
    // Нормализуем (landmarks в пикселях видео)
    const vW = video.videoWidth || 640;
    const vH = video.videoHeight || 480;
    const norm = kp.map(p => [p[0]/vW, p[1]/vH, p[2]]);

    drawHand(ctx, norm, W, H);
    const n = countFingers(kp.map(p => [p[0], p[1]]));
    document.getElementById('fingers').textContent = n;
    document.getElementById('gesture').textContent = gestureEmoji(n);
  } else {
    document.getElementById('fingers').textContent = '—';
    document.getElementById('gesture').textContent = '—';
  }

  requestAnimationFrame(() => loop(video, canvas, ctx));
}

document.getElementById('startBtn').addEventListener('click', async () => {
  const btn = document.getElementById('startBtn');
  btn.disabled = true;

  try {
    // 1. Камера
    log('📷 Запрашиваю камеру...');
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: {ideal:640}, height: {ideal:480} }
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    await video.play();
    log('✅ Камера работает. Загружаю TF.js...');

    // 2. Загрузка библиотек
    await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js');
    log('✅ TensorFlow.js загружен. Загружаю модель рук...');

    await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow-models/handpose@0.0.7/dist/handpose.js');
    log('✅ Модель загружена. Инициализация...');

    // 3. Модель
    model = await handpose.load();
    log('🚀 Готово! Покажи руку камере.');

    // 4. Canvas
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const resize = () => {
      const c = document.getElementById('container');
      canvas.width = c.offsetWidth;
      canvas.height = c.offsetHeight;
    };
    resize();
    window.addEventListener('resize', resize);

    // 5. Старт
    document.getElementById('overlay').classList.add('hidden');
    running = true;
    lastT = performance.now();
    loop(video, canvas, ctx);

  } catch(e) {
    log('❌ ' + e.message, true);
    btn.disabled = false;
  }
});
</script>
</body>
</html>
